---
# Consumer ServiceAccount — bound to GCP SA via Workload Identity
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pulseq-consumer
  namespace: default
  annotations:
    iam.gke.io/gcp-service-account: pulseq-consumer@PROJECT_ID.iam.gserviceaccount.com
---
# KEDA namespace (KEDA operator installs here via Helm)
apiVersion: v1
kind: Namespace
metadata:
  name: keda
