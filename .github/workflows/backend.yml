name: Deploy backend

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
    branches: [main]

jobs:
  test:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - name: Install and lint
        run: |
          pip install -r backend/requirements.txt
          pip install ruff
          ruff check backend/

  deploy:
    name: Build & deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push
        run: |
          IMAGE="us-central1-docker.pkg.dev/pulseq-1773525063/pulseq/backend:${{ github.sha }}"
          docker build --platform linux/amd64 -t "$IMAGE" ./backend
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          IMAGE="us-central1-docker.pkg.dev/pulseq-1773525063/pulseq/backend:${{ github.sha }}"
          gcloud run deploy pulseq-api \
            --image "$IMAGE" \
            --region us-central1 \
            --service-account pulseq-backend@pulseq-1773525063.iam.gserviceaccount.com \
            --set-env-vars "PROJECT_ID=pulseq-1773525063,GOOGLE_CLOUD_PROJECT=pulseq-1773525063,DATABASE_URL=postgresql+asyncpg://pulseq:PulseQ2024Secure@172.22.0.3:5432/pulseqdb" \
            --allow-unauthenticated \
            --min-instances 1 \
            --memory 1Gi \
            --vpc-connector pulseq-connector \
            --vpc-egress private-ranges-only \
            --project pulseq-1773525063
