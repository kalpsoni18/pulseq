name: Deploy consumer

on:
  push:
    paths:
      - 'consumer/**'
      - 'manifests/**'
      - '.github/workflows/consumer.yml'
    branches: [main]

env:
  REGION: us-central1
  CLUSTER: pulseq-cluster

jobs:
  deploy:
    name: Build, push & rollout to GKE
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push consumer image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/pulseq/consumer:${{ github.sha }}"
          docker build -t "$IMAGE" ./consumer
          docker push "$IMAGE"

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.CLUSTER }} \
            --region ${{ env.REGION }} \
            --project ${{ vars.PROJECT_ID }}

      - name: Apply K8s manifests (with image substitution)
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/pulseq/consumer:${{ github.sha }}"
          export IMAGE_TAG="${{ github.sha }}"
          export PROJECT_ID="${{ vars.PROJECT_ID }}"
          export REGION="${{ env.REGION }}"

          # Substitute placeholders and apply
          envsubst < manifests/serviceaccounts.yaml | kubectl apply -f -
          envsubst < manifests/deployment.yaml      | kubectl apply -f -
          kubectl apply -f manifests/keda-resources.yaml

          # Update the image directly (fastest way)
          kubectl set image deployment/pulseq-consumer \
            consumer="$IMAGE" \
            --record

      - name: Wait for rollout
        run: kubectl rollout status deployment/pulseq-consumer --timeout=120s

      - name: Show pod status
        run: kubectl get pods -l app=pulseq-consumer
