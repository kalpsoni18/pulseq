name: Deploy consumer

on:
  push:
    paths:
      - 'consumer/**'
      - 'manifests/**'
      - '.github/workflows/consumer.yml'
    branches: [main]

env:
  REGION: us-central1
  CLUSTER: pulseq-cluster

jobs:
  deploy:
    name: Build, push & rollout to GKE
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push consumer image
        run: |
          IMAGE="us-central1-docker.pkg.dev/pulseq-1773525063/pulseq/consumer:${{ github.sha }}"
          docker build --platform linux/amd64 -t "$IMAGE" ./consumer
          docker push "$IMAGE"

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials pulseq-cluster \
            --region us-central1 \
            --project pulseq-1773525063

      - name: Apply K8s manifests
        run: |
          IMAGE="us-central1-docker.pkg.dev/pulseq-1773525063/pulseq/consumer:${{ github.sha }}"
          export IMAGE_TAG="${{ github.sha }}"
          export PROJECT_ID="pulseq-1773525063"
          export REGION="us-central1"
          envsubst < manifests/serviceaccounts.yaml | kubectl apply -f -
          envsubst < manifests/deployment.yaml      | kubectl apply -f -
          kubectl apply -f manifests/keda-resources.yaml
          kubectl set image deployment/pulseq-consumer consumer="$IMAGE"

      - name: Wait for rollout
        run: kubectl rollout status deployment/pulseq-consumer --timeout=120s

      - name: Show pod status
        run: kubectl get pods -l app=pulseq-consumer
